version: v2
inputs:
  - directory: benefits

plugins:
  - remote: buf.build/protocolbuffers/go
    out: pb
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: pb
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  - remote: buf.build/protocolbuffers/python:v23.4
    out: python_pb

  - remote: buf.build/protocolbuffers/pyi:v23.4
    out: python_pb

  - remote: buf.build/grpc/python:v1.56.1
    out: python_pb
